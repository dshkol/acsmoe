url: https://dshkol.github.io/acsmoe/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#0054AD"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem

home:
  title: ACS MOE Uncertainty Propagation
  description: >
    Propagate uncertainty for American Community Survey tabular estimates,
    with tidycensus-compatible MOE workflows and optional covariance handling.

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/tidycensus-workflow.html
    articles:
      text: Articles
      menu:
        - text: Workflows
        - text: Using acsmoe with tidycensus
          href: articles/tidycensus-workflow.html
        - text: Mapping ACS uncertainty
          href: articles/tidycensus-maps.html

articles:
  - title: Workflows
    navbar: Workflows
    contents:
      - tidycensus-workflow
      - articles/tidycensus-maps

reference:
  - title: Core Propagation
    contents:
      - acs_sum
      - acs_diff
      - acs_ratio
      - acs_prop
      - acs_product
      - acs_linear
  - title: Simulation
    contents:
      - acs_simulate
      - acs_simulate_fn
  - title: Aggregation
    contents:
      - acs_aggregate
  - title: Conversion and Diagnostics
    contents:
      - moe_to_se
      - se_to_moe
      - moe_ci
      - acs_cv
      - acs_reliability
